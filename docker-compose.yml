services:
  node:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - .:/app
    ports:
      - "5173:5173"
    environment:
      - API_PROXY_TARGET=http://app:80
    command: sh -c "npm install && npm run dev"
    networks:
      - bradypus-net

networks:
  bradypus-net:
    external: true    # created by bdus-api's docker-compose.yml
    name: bradypus-net
